services:
  annotation-review:
    #build: ./
    image: semtech/mu-javascript-template:1.9.1
    restart: no
    labels:
      - logging=true
    environment:
      # disabled for now as odrl version doesn't support scopes yet
      DEFAULT_MU_AUTH_SCOPE: "http://services.semantic.works/annotation-review-service"
      TZ: Europe/Brussels
      NODE_ENV: development
    ports:
      - "8082:80"
      - "9225:9229"
    volumes:
      - ./:/app
    networks:
      - debug

networks:
  debug:
    external: true
